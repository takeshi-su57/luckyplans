      <rect x="34" y="46" width="252" height="5" rx="2.5" fill="#d8e2f4"/>
      <rect x="34" y="46" width="148" height="5" rx="2.5" fill="#8733df"/>
      <text x="42" y="100" font-size="24" font-weight="850" fill="#0f1831">Public resources</text>
