<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1490 420" role="img" aria-labelledby="title desc">
  <title id="title">Roadmap progress timeline</title>
  <desc id="desc">Four roadmap item cards connected by progress circles and a stepper.</desc>

  <g font-family="Inter, Arial, sans-serif">
    <g fill="none" stroke="#d8e2f4" stroke-width="5" stroke-linecap="round">
      <path d="M222 60h282"/>
      <path d="M597 60h282"/>
      <path d="M972 60h282"/>
    </g>

    <g fill="#ffffff" stroke-width="3">
      <circle cx="180" cy="60" r="44" stroke="#2d63e2"/>
      <circle cx="555" cy="60" r="44" stroke="#8733df"/>
      <circle cx="930" cy="60" r="44" stroke="#18a865"/>
      <circle cx="1305" cy="60" r="44" stroke="#ed9400"/>
    </g>

    <g font-size="42" font-weight="900" text-anchor="middle">
      <text x="180" y="75" fill="#2d63e2">1</text>
      <text x="555" y="75" fill="#8733df">2</text>
      <text x="930" y="75" fill="#18a865">3</text>
      <text x="1305" y="75" fill="#ed9400">4</text>
