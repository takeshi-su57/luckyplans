name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Type-check, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # On PRs, only run affected packages (compared to main).
      # On push to main, run everything.
      - name: Set Turbo filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "TURBO_FILTER=--filter=...[origin/main]" >> "$GITHUB_ENV"
          fi

      - name: Lint
        run: pnpm turbo run lint ${TURBO_FILTER:-}

      - name: Type-check
        run: pnpm turbo run type-check ${TURBO_FILTER:-}

      - name: Test
        run: pnpm turbo run test ${TURBO_FILTER:-}

      - name: Build
        run: pnpm turbo run build ${TURBO_FILTER:-}

      - name: Setup Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Lint Helm chart
        run: |
          helm lint infrastructure/helm/luckyplans
          helm lint infrastructure/helm/luckyplans -f infrastructure/helm/luckyplans/values.dev.yaml
          helm lint infrastructure/helm/luckyplans -f infrastructure/helm/luckyplans/values.prod.yaml

      - name: Validate Helm templates
        run: |
          helm template luckyplans infrastructure/helm/luckyplans \
            -f infrastructure/helm/luckyplans/values.yaml
          helm template luckyplans infrastructure/helm/luckyplans \
            -f infrastructure/helm/luckyplans/values.yaml \
            -f infrastructure/helm/luckyplans/values.dev.yaml
          helm template luckyplans infrastructure/helm/luckyplans \
            -f infrastructure/helm/luckyplans/values.yaml \
            -f infrastructure/helm/luckyplans/values.prod.yaml
