name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write

jobs:
  ci:
    name: Lint, Type-check, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # On PRs, only run affected packages (compared to main).
      # On push to main, run everything.
      - name: Set Turbo filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "TURBO_FILTER=--filter=...[origin/main]" >> "$GITHUB_ENV"
          fi

      - name: Lint
        run: pnpm turbo run lint ${TURBO_FILTER:-}

      - name: Type-check
        run: pnpm turbo run type-check ${TURBO_FILTER:-}

      - name: Test
        run: pnpm turbo run test ${TURBO_FILTER:-}

      - name: Build
        run: pnpm turbo run build ${TURBO_FILTER:-}

      - name: Scan dependencies for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln'

      - name: Scan Dockerfiles & IaC for misconfigurations
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy SARIF report
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln'

      - name: Upload results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Setup Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Lint Helm chart
        run: |
          helm lint infrastructure/helm/luckyplans
          helm lint infrastructure/helm/luckyplans -f infrastructure/helm/luckyplans/values.prod.yaml

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - name: Validate Helm templates
        run: |
          # -ignore-missing-schemas: Traefik Middleware and cert-manager
          # ClusterIssuer CRDs have no built-in kubeconform schemas
          helm template luckyplans infrastructure/helm/luckyplans \
            -f infrastructure/helm/luckyplans/values.yaml \
            | kubeconform -strict -ignore-missing-schemas -summary -output text
          helm template luckyplans infrastructure/helm/luckyplans \
            -f infrastructure/helm/luckyplans/values.yaml \
            -f infrastructure/helm/luckyplans/values.prod.yaml \
            | kubeconform -strict -ignore-missing-schemas -summary -output text
