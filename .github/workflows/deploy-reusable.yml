name: Deploy (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (dev or prod)"
        required: true
        type: string
      image-tag:
        description: "Image tag to deploy"
        required: true
        type: string
      deploy-host:
        description: "Host to run smoke tests against"
        required: true
        type: string
      values-file:
        description: "Environment-specific Helm values file"
        required: true
        type: string
      checkout-ref:
        description: "Git ref to checkout"
        required: true
        type: string
    secrets:
      KUBECONFIG_DATA:
        required: true
      DB_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false

    environment: ${{ inputs.environment }}

    env:
      IMAGE_TAG: ${{ inputs.image-tag }}
      DEPLOY_HOST: ${{ inputs.deploy-host }}
      REPO_OWNER: ${{ github.repository_owner }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.checkout-ref }}

      - name: Setup Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Setup kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4.0.1

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          # Patch: skip TLS verify (k3s self-signed cert doesn't include the public IP in SAN)
          # Remove certificate-authority-data and add insecure-skip-tls-verify to the file
          # so both kubectl and Helm respect it.
          CLUSTER_NAME=$(kubectl config view -o jsonpath='{.clusters[0].name}')
          kubectl config set-cluster "$CLUSTER_NAME" --insecure-skip-tls-verify=true
          # Also remove certificate-authority-data from the file (kubectl config set doesn't remove it)
          sed -i '/certificate-authority-data/d' "$HOME/.kube/config"
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}

      - name: Helm diff (audit)
        continue-on-error: true
        run: |
          helm plugin install https://github.com/databus23/helm-diff 2>/dev/null || true
          # Secrets are excluded from diff to avoid noisy false-positives
          # (REDACTED placeholder would always show as changed vs real value).
          helm diff upgrade luckyplans ./infrastructure/helm/luckyplans \
            -f infrastructure/helm/luckyplans/values.yaml \
            -f "infrastructure/helm/luckyplans/$VALUES_FILE" \
            --set image.registry=ghcr.io \
            --set "apiGateway.image.repository=$REPO_OWNER/api-gateway" \
            --set "apiGateway.image.tag=$IMAGE_TAG" \
            --set "serviceAuth.image.repository=$REPO_OWNER/service-auth" \
            --set "serviceAuth.image.tag=$IMAGE_TAG" \
            --set "serviceCore.image.repository=$REPO_OWNER/service-core" \
            --set "serviceCore.image.tag=$IMAGE_TAG" \
            --set "web.image.repository=$REPO_OWNER/web" \
            --set "web.image.tag=$IMAGE_TAG" \
            --namespace luckyplans 2>&1 || echo "(helm diff unavailable or first deploy)"
        env:
          VALUES_FILE: ${{ inputs.values-file }}

      - name: Deploy with Helm
        id: helm-deploy
        run: |
          helm upgrade --install luckyplans ./infrastructure/helm/luckyplans \
            -f infrastructure/helm/luckyplans/values.yaml \
            -f "infrastructure/helm/luckyplans/$VALUES_FILE" \
            --set image.registry=ghcr.io \
            --set "apiGateway.image.repository=$REPO_OWNER/api-gateway" \
            --set "apiGateway.image.tag=$IMAGE_TAG" \
            --set "serviceAuth.image.repository=$REPO_OWNER/service-auth" \
            --set "serviceAuth.image.tag=$IMAGE_TAG" \
            --set "serviceCore.image.repository=$REPO_OWNER/service-core" \
            --set "serviceCore.image.tag=$IMAGE_TAG" \
            --set "web.image.repository=$REPO_OWNER/web" \
            --set "web.image.tag=$IMAGE_TAG" \
            --set-string secrets.DB_PASSWORD="$DB_PASSWORD" \
            --namespace luckyplans --create-namespace \
            --rollback-on-failure --timeout 5m
        env:
          VALUES_FILE: ${{ inputs.values-file }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Smoke tests
        id: smoke
        run: |
          chmod +x .github/scripts/smoke-test.sh
          .github/scripts/smoke-test.sh "$DEPLOY_HOST" "$IMAGE_TAG"

      - name: Rollback on smoke test failure
        if: failure() && steps.helm-deploy.outcome == 'success' && steps.smoke.outcome == 'failure'
        id: rollback
        run: |
          REVISIONS=$(helm -n luckyplans history luckyplans --max 2 -o json 2>/dev/null | jq length)
          if [ "$REVISIONS" -gt 1 ] 2>/dev/null; then
            echo "Rolling back to previous revision..."
            helm -n luckyplans rollback luckyplans 0 --wait --timeout 3m
          else
            echo "No previous revision to rollback to (first deploy). Uninstalling failed release..."
            helm -n luckyplans uninstall luckyplans --wait --timeout 3m || true
          fi

      - name: Verify rollback health
        if: failure() && steps.rollback.outcome == 'success'
        run: |
          echo "==> Verifying rollback health..."
          for i in $(seq 1 3); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "https://$DEPLOY_HOST/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "    Rollback verification PASSED: health endpoint returned HTTP 200"
              exit 0
            fi
            echo "    Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "FATAL: Rollback deployed but health check is not passing"
          exit 1

      - name: Report deployment status
        if: always()
        run: |
          echo "## ${ENVIRONMENT^} Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image tag:** $IMAGE_TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Namespace:** luckyplans" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          kubectl -n luckyplans get pods -o wide >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        env:
          ENVIRONMENT: ${{ inputs.environment }}

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f "$HOME/.kube/config"
