name: Docker Build & Push

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA). Defaults to the default branch.'
        required: false
        type: string
        default: ''

concurrency:
  # For workflow_run triggers github.ref is always the default branch, so this
  # group is effectively a singleton queue that serialises all Docker builds.
  group: docker-build-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Only run after successful CI or on manual dispatch
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: landing
            dockerfile: apps/landing/Dockerfile
          - service: docs
            dockerfile: apps/docs/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile
          - service: api-gateway
            dockerfile: apps/api-gateway/Dockerfile
          - service: prisma-migrate
            dockerfile: packages/prisma/Dockerfile

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate short SHA
        id: sha
        run: |
          # Always resolve from the actual checked-out commit to handle branch
          # names, tags, and SHAs uniformly (inputs.ref could be a branch name
          # like "main" which cut -c1-7 would mangle).
          echo "short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set NEXT_PUBLIC_GRAPHQL_URL for web
        if: matrix.service == 'web'
        id: graphql-url
        run: |
          # Use relative URL so a single image works on any domain (dev, prod, local)
          echo "url=/graphql" >> "$GITHUB_OUTPUT"

      - name: Set landing URLs
        if: matrix.service == 'landing'
        id: landing-urls
        run: |
          echo "app_url=https://app.luckyplans.xyz/login" >> "$GITHUB_OUTPUT"
          echo "docs_url=https://docs.luckyplans.xyz" >> "$GITHUB_OUTPUT"

      - name: Set docs app URL
        if: matrix.service == 'docs'
        id: docs-app-url
        run: |
          echo "app_url=https://app.luckyplans.xyz/login" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          provenance: true
          sbom: true
          build-args: |
            ${{ matrix.service == 'landing' && format('VITE_APP_URL={0}', steps.landing-urls.outputs.app_url) || '' }}
            ${{ matrix.service == 'landing' && format('VITE_DOCS_URL={0}', steps.landing-urls.outputs.docs_url) || '' }}
            ${{ matrix.service == 'docs' && format('DOCS_APP_URL={0}', steps.docs-app-url.outputs.app_url) || '' }}
            ${{ matrix.service == 'web' && format('NEXT_PUBLIC_GRAPHQL_URL={0}', steps.graphql-url.outputs.url) || '' }}
            ${{ matrix.service == 'web' && format('NEXT_PUBLIC_DOCS_URL={0}', 'https://docs.luckyplans.xyz') || '' }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          timeout: '10m'

      - name: Generate Trivy SARIF report
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          timeout: '10m'

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Output image digest
        run: echo "Pushed ${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}"
