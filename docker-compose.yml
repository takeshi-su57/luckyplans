# Local development infrastructure only.
# Apps run via `pnpm dev` (Turborepo). This file provides the backing services
# needed for day-to-day development: Redis, PostgreSQL, Keycloak, and MinIO.
# Observability and Kubernetes-specific components live under `infrastructure/`
# and are exercised through the Helm/k3d workflow instead of Docker Compose.
#
# Usage:
#   docker compose up -d          # start infrastructure
#   docker compose down           # stop infrastructure
#   docker compose down -v        # stop and remove volumes (reset local data)

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  postgresql-keycloak:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - postgresql-keycloak-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keycloak']
      interval: 10s
      timeout: 5s
      retries: 5

  postgresql-app:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - '5434:5432'
    environment:
      POSTGRES_DB: luckyplans
      POSTGRES_USER: luckyplans
      POSTGRES_PASSWORD: luckyplans
    volumes:
      - postgresql-app-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U luckyplans']
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: start-dev --import-realm
    ports:
      - '8080:8080'
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgresql-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    volumes:
      - ./infrastructure/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgresql-keycloak:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8080/realms/luckyplans || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9000/minio/health/live || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgresql-keycloak-data:
  postgresql-app-data:
  minio-data:
