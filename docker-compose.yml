# Local development infrastructure only.
# Apps run via `pnpm dev` (Turborepo). This file provides Redis, Keycloak,
# and the observability stack (OTel Collector, Prometheus, Grafana, Loki, Tempo).
# Next.js rewrites proxy /auth/* and /graphql to the gateway — no nginx needed.
#
# Usage:
#   docker compose up -d          # start infrastructure
#   docker compose down           # stop infrastructure
#   docker compose down -v        # stop and remove volumes (reset all data)
#
# Observability UIs:
#   Grafana:    http://localhost:3002 (admin/admin)
#   Prometheus: http://localhost:9090

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  postgresql:
    image: postgres:17-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keycloak']
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    ports:
      - '8080:8080'
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgresql:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    volumes:
      - ./infrastructure/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8080/realms/luckyplans || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ============================================================
  # Observability stack
  # ============================================================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    ports:
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP
      - '8889:8889' # Prometheus metrics
    volumes:
      - ./infrastructure/otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - loki
      - tempo

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - '9090:9090'
    volumes:
      - ./infrastructure/otel/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=3d'
      - '--web.enable-lifecycle'
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - '3002:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./infrastructure/otel/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./infrastructure/otel/grafana/dashboards/provider.yaml:/etc/grafana/provisioning/dashboards/provider.yaml:ro
      - ./infrastructure/otel/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  loki:
    image: grafana/loki:2.9.4
    ports:
      - '3100:3100'
    volumes:
      - ./infrastructure/otel/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  tempo:
    image: grafana/tempo:2.4.0
    ports:
      - '3200:3200' # Tempo query API
    volumes:
      - ./infrastructure/otel/tempo-config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    command: -config.file=/etc/tempo/config.yaml

volumes:
  postgresql-data:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:
