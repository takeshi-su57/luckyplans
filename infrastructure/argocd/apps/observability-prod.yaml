apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: luckyplans-observability
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/takeshi-su57/luckyplans.git
    targetRevision: main
    path: infrastructure/helm/observability
    helm:
      valueFiles:
        - values.prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
