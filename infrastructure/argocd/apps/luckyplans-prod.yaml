apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: luckyplans-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/takeshi-su57/luckyplans.git
    targetRevision: main
    path: infrastructure/helm/luckyplans
    helm:
      valueFiles:
        - values.prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: luckyplans
  # The sealed-secrets-controller creates and owns the plain Secret from the
  # SealedSecret CRD. ArgoCD must not diff or overwrite the controller-managed
  # Secret — ignore its data entirely.
  ignoreDifferences:
    - group: ''
      kind: Secret
      name: luckyplans-secrets
      jsonPointers:
        - /data
        - /metadata
    # Existing VPS PVCs use local-path storage, which cannot be resized by
    # ArgoCD patch operations. Keep Git managing the PVCs, but do not reconcile
    # the storage request field after the volume is bound.
    - group: ''
      kind: PersistentVolumeClaim
      name: postgresql-data
      namespace: luckyplans
      jsonPointers:
        - /spec/resources/requests/storage
    - group: ''
      kind: PersistentVolumeClaim
      name: minio-data
      namespace: luckyplans
      jsonPointers:
        - /spec/resources/requests/storage
  syncPolicy:
    automated:
      prune: true # remove resources no longer in Git
      selfHeal: true # revert manual cluster changes back to Git state
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
