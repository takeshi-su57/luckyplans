# ============================================================
# Production overrides for observability stack
# ============================================================

prometheus:
  retention: 3d
  storage: 3Gi
  resources:
    requests:
      memory: '256Mi'
      cpu: '100m'
    limits:
      memory: '768Mi'
      cpu: '400m'

grafana:
  adminPassword: '' # Set via sealed secret in production
  ingress:
    enabled: true
    host: admin.luckyplans.xyz
  resources:
    requests:
      memory: '96Mi'
      cpu: '50m'
    limits:
      memory: '256Mi'
      cpu: '200m'

otelCollector:
  resources:
    requests:
      memory: '96Mi'
      cpu: '50m'
    limits:
      memory: '256Mi'
      cpu: '200m'

loki:
  retention: 72h # 3 days
  storage: 3Gi
  resources:
    requests:
      memory: '128Mi'
      cpu: '50m'
    limits:
      memory: '384Mi'
      cpu: '200m'

tempo:
  retention: 24h # 1 day
  storage: 1Gi
  resources:
    requests:
      memory: '128Mi'
      cpu: '50m'
    limits:
      memory: '256Mi'
      cpu: '200m'
