apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ include "observability.namespace" . }}
  labels:
    app.kubernetes.io/name: grafana
    {{- include "observability.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
