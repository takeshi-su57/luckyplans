apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: {{ include "observability.namespace" . }}
  labels:
    app.kubernetes.io/name: tempo
    {{- include "observability.labels" . | nindent 4 }}
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    metrics_generator:
      storage:
        path: /var/tempo/generator/wal
      traces_storage:
        path: /var/tempo/generator/traces

    overrides:
      defaults:
        metrics_generator:
          processors: [service-graphs, span-metrics]
