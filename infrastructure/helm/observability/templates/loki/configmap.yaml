apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: {{ include "observability.namespace" . }}
  labels:
    app.kubernetes.io/name: loki
    {{- include "observability.labels" . | nindent 4 }}
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      retention_period: {{ .Values.loki.retention }}
      allow_structured_metadata: true

    compactor:
      working_directory: /loki/compactor
      retention_enabled: true
