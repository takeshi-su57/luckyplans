apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: {{ include "observability.namespace" . }}
  labels:
    app.kubernetes.io/name: loki
    {{- include "observability.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
      protocol: TCP
