apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: {{ include "observability.namespace" . }}
  labels:
    app.kubernetes.io/name: promtail
    {{- include "observability.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: promtail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: promtail
        {{- include "observability.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/promtail/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: {{ .Values.promtail.image }}
          args:
            - '-config.file=/etc/promtail/promtail.yaml'
          volumeMounts:
            - name: config
              mountPath: /etc/promtail/promtail.yaml
              subPath: promtail.yaml
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: containers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: positions
              mountPath: /tmp
          resources:
            requests:
              memory: {{ .Values.promtail.resources.requests.memory }}
              cpu: {{ .Values.promtail.resources.requests.cpu }}
            limits:
              memory: {{ .Values.promtail.resources.limits.memory }}
              cpu: {{ .Values.promtail.resources.limits.cpu }}
      tolerations:
        - effect: NoSchedule
          operator: Exists
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: containers
          hostPath:
            path: /var/lib/docker/containers
        - name: positions
          emptyDir: {}
