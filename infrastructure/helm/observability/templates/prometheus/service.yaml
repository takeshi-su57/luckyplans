apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ include "observability.namespace" . }}
  labels:
    app.kubernetes.io/name: prometheus
    {{- include "observability.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      protocol: TCP
