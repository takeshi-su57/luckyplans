{{- if .Values.sealedSecrets.enabled }}
{{- /*
  SealedSecret for production (ArgoCD).
  The sealed-secrets-controller decrypts this into a plain K8s Secret
  named "luckyplans-secrets" — the same name all deployments reference.
  Encrypted values are safe to commit to git.
*/ -}}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: luckyplans-secrets
  namespace: {{ include "luckyplans.namespace" . }}
  labels:
    {{- include "luckyplans.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  encryptedData:
    {{- range $key, $val := .Values.sealedSecrets.encryptedData }}
    {{ $key }}: {{ $val | quote }}
    {{- end }}
  template:
    metadata:
      name: luckyplans-secrets
      namespace: {{ include "luckyplans.namespace" . }}
      labels:
        {{- include "luckyplans.labels" . | nindent 8 }}
    type: Opaque
{{- end }}
