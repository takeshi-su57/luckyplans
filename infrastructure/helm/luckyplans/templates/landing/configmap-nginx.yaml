apiVersion: v1
kind: ConfigMap
metadata:
  name: landing-nginx
  namespace: {{ include "luckyplans.namespace" . }}
  labels:
    {{- include "luckyplans.componentLabels" (dict "component" "landing" "ctx" .) | nindent 4 }}
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
      }
    }
