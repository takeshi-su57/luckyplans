{{- if not .Values.sealedSecrets.enabled }}
{{- /*
  Plain Secret for local dev / local k3d.
  In production, sealedSecrets.enabled=true renders a SealedSecret instead
  (see sealed-secret.yaml). The controller decrypts it into the same
  luckyplans-secrets Secret name — deployments need no changes.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: luckyplans-secrets
  namespace: {{ include "luckyplans.namespace" . }}
  labels:
    {{- include "luckyplans.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
  {{- range $key, $val := .Values.secrets }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
