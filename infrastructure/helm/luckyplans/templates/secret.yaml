{{- /*
  Secret management strategy:
  - For ArgoCD (helm template): lookup always returns empty, so we MUST fall
    back to values. randAlphaNum causes drift on every render, making ArgoCD
    unable to sync the Secret reliably.
  - Solution: All secrets are required in values (or --set). The Helm chart
    does NOT auto-generate secrets. For local dev, values.yaml provides safe
    defaults. For prod, values.prod.yaml or --set must supply real values.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: luckyplans-secrets
  namespace: {{ include "luckyplans.namespace" . }}
  labels:
    {{- include "luckyplans.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
  JWT_SECRET: {{ required "secrets.JWT_SECRET is required" (index .Values.secrets "JWT_SECRET") | quote }}
  SESSION_SECRET: {{ required "secrets.SESSION_SECRET is required" (index .Values.secrets "SESSION_SECRET") | quote }}
  KEYCLOAK_CLIENT_SECRET: {{ required "secrets.KEYCLOAK_CLIENT_SECRET is required" (index .Values.secrets "KEYCLOAK_CLIENT_SECRET") | quote }}
  POSTGRES_PASSWORD: {{ required "secrets.POSTGRES_PASSWORD is required" (index .Values.secrets "POSTGRES_PASSWORD") | quote }}
  {{- if index .Values.secrets "DB_PASSWORD" }}
  DB_PASSWORD: {{ index .Values.secrets "DB_PASSWORD" | quote }}
  {{- end }}
  {{- /* Render any extra secrets from values */ -}}
  {{- range $key, $val := .Values.secrets }}
  {{- if and (ne $key "JWT_SECRET") (ne $key "DB_PASSWORD") (ne $key "SESSION_SECRET") (ne $key "KEYCLOAK_CLIENT_SECRET") (ne $key "POSTGRES_PASSWORD") }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- end }}
