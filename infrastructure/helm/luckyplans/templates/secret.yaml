{{- $existingSecret := (lookup "v1" "Secret" (include "luckyplans.namespace" .) "luckyplans-secrets") }}
apiVersion: v1
kind: Secret
metadata:
  name: luckyplans-secrets
  namespace: {{ include "luckyplans.namespace" . }}
  labels:
    {{- include "luckyplans.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- /* Reuse existing JWT_SECRET or auto-generate on first install */ -}}
  {{- if and $existingSecret $existingSecret.data (index $existingSecret.data "JWT_SECRET") }}
  JWT_SECRET: {{ index $existingSecret.data "JWT_SECRET" | b64dec | quote }}
  {{- else }}
  JWT_SECRET: {{ randAlphaNum 64 | quote }}
  {{- end }}
  {{- /* Reuse existing DB_PASSWORD if present (supports ArgoCD GitOps — no --set needed) */ -}}
  {{- if and $existingSecret $existingSecret.data (index $existingSecret.data "DB_PASSWORD") }}
  DB_PASSWORD: {{ index $existingSecret.data "DB_PASSWORD" | b64dec | quote }}
  {{- else if and .Values.secrets (index .Values.secrets "DB_PASSWORD") }}
  DB_PASSWORD: {{ index .Values.secrets "DB_PASSWORD" | quote }}
  {{- end }}
  {{- /* Reuse existing SESSION_SECRET or auto-generate on first install */ -}}
  {{- if and $existingSecret $existingSecret.data (index $existingSecret.data "SESSION_SECRET") }}
  SESSION_SECRET: {{ index $existingSecret.data "SESSION_SECRET" | b64dec | quote }}
  {{- else if and .Values.secrets (index .Values.secrets "SESSION_SECRET") }}
  SESSION_SECRET: {{ index .Values.secrets "SESSION_SECRET" | quote }}
  {{- else }}
  SESSION_SECRET: {{ randAlphaNum 64 | quote }}
  {{- end }}
  {{- /* Reuse existing POSTGRES_PASSWORD or auto-generate on first install */ -}}
  {{- if and $existingSecret $existingSecret.data (index $existingSecret.data "POSTGRES_PASSWORD") }}
  POSTGRES_PASSWORD: {{ index $existingSecret.data "POSTGRES_PASSWORD" | b64dec | quote }}
  {{- else if and .Values.secrets (index .Values.secrets "POSTGRES_PASSWORD") }}
  POSTGRES_PASSWORD: {{ index .Values.secrets "POSTGRES_PASSWORD" | quote }}
  {{- else }}
  POSTGRES_PASSWORD: {{ randAlphaNum 32 | quote }}
  {{- end }}
  {{- /* Reuse existing KEYCLOAK_CLIENT_SECRET or use from values (required) */ -}}
  {{- if and $existingSecret $existingSecret.data (index $existingSecret.data "KEYCLOAK_CLIENT_SECRET") }}
  KEYCLOAK_CLIENT_SECRET: {{ index $existingSecret.data "KEYCLOAK_CLIENT_SECRET" | b64dec | quote }}
  {{- else if and .Values.secrets (index .Values.secrets "KEYCLOAK_CLIENT_SECRET") }}
  KEYCLOAK_CLIENT_SECRET: {{ index .Values.secrets "KEYCLOAK_CLIENT_SECRET" | quote }}
  {{- else }}
  KEYCLOAK_CLIENT_SECRET: {{ required "secrets.KEYCLOAK_CLIENT_SECRET is required" nil }}
  {{- end }}
  {{- /* Render any other secrets from values */ -}}
  {{- range $key, $val := .Values.secrets }}
  {{- if and (ne $key "JWT_SECRET") (ne $key "DB_PASSWORD") (ne $key "SESSION_SECRET") (ne $key "KEYCLOAK_CLIENT_SECRET") (ne $key "POSTGRES_PASSWORD") }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- end }}
