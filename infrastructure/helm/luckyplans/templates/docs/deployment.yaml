{{- $component := "docs" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $component }}
  namespace: {{ include "luckyplans.namespace" . }}
  labels:
    {{- include "luckyplans.componentLabels" (dict "component" $component "ctx" .) | nindent 4 }}
  annotations:
    luckyplans/baked-app-url: {{ .Values.docs.buildArgs.appUrl | quote }}
spec:
  replicas: {{ .Values.docs.replicas }}
  selector:
    matchLabels:
      {{- include "luckyplans.selectorLabels" (dict "component" $component "ctx" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "luckyplans.componentLabels" (dict "component" $component "ctx" .) | nindent 8 }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: nginx-config
          configMap:
            name: docs-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
      containers:
        - name: {{ $component }}
          image: {{ include "luckyplans.image" (dict "registry" .Values.image.registry "repository" .Values.docs.image.repository "tag" .Values.docs.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.docs.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.docs.probes.readiness.path }}
              port: {{ .Values.docs.probes.readiness.port }}
            initialDelaySeconds: {{ .Values.docs.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.docs.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.docs.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.docs.probes.liveness.path }}
              port: {{ .Values.docs.probes.liveness.port }}
            initialDelaySeconds: {{ .Values.docs.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.docs.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.docs.probes.liveness.failureThreshold }}
