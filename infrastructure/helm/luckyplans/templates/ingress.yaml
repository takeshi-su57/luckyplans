{{- if .Values.ingress.enabled }}
{{- $appHost := .Values.ingress.hosts.app | default "" -}}
{{- $apiHost := .Values.ingress.hosts.api | default "" -}}
{{- $adminHost := .Values.ingress.hosts.admin | default "" -}}
{{- $legacyHost := .Values.ingress.host | default "" -}}
{{- $legacyV0Host := .Values.legacyV0.host | default "" -}}
{{- $useMultiHost := and $appHost (and $apiHost $adminHost) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: luckyplans-ingress
  namespace: {{ include "luckyplans.namespace" . }}
  labels:
    {{- include "luckyplans.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    {{- if $useMultiHost }}
    - hosts:
        - {{ $appHost | quote }}
      secretName: {{ .Values.ingress.tls.secrets.app | quote }}
    - hosts:
        - {{ $apiHost | quote }}
      secretName: {{ .Values.ingress.tls.secrets.api | quote }}
    - hosts:
        - {{ $adminHost | quote }}
      secretName: {{ .Values.ingress.tls.secrets.admin | quote }}
    {{- if and .Values.legacyV0.enabled $legacyV0Host }}
    - hosts:
        - {{ $legacyV0Host | quote }}
      secretName: {{ .Values.ingress.tls.secrets.v0api | quote }}
    {{- end }}
    {{- else }}
    - hosts:
        - {{ $legacyHost | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- if $useMultiHost }}
    - host: {{ $appHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
    - host: {{ $apiHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3001
    - host: {{ $adminHost | quote }}
      http:
        paths:
          {{- if .Values.keycloak.enabled }}
          - path: /realms
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80
          - path: /resources
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80
          - path: /js
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80
          {{- end }}
    {{- if and .Values.legacyV0.enabled $legacyV0Host }}
    - host: {{ $legacyV0Host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: legacy-v0-api
                port:
                  number: {{ .Values.legacyV0.upstreamPort }}
    {{- end }}
    {{- else }}
    - {{- if $legacyHost }}
      host: {{ $legacyHost | quote }}
      {{- end }}
      http:
        paths:
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3001
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3001
          {{- if .Values.keycloak.enabled }}
          - path: /realms
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80
          - path: /resources
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80
          - path: /js
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80
          {{- end }}
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3001
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
    {{- end }}
{{- end }}
