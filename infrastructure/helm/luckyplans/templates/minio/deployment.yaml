{{- $component := "minio" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $component }}
  namespace: {{ include "luckyplans.namespace" . }}
  labels:
    {{- include "luckyplans.componentLabels" (dict "component" $component "ctx" .) | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "luckyplans.selectorLabels" (dict "component" $component "ctx" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "luckyplans.componentLabels" (dict "component" $component "ctx" .) | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: {{ $component }}
          image: {{ .Values.minio.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["minio", "server", "/data", "--console-address", ":9001"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: luckyplans-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: luckyplans-secrets
                  key: MINIO_SECRET_KEY
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: minio-data
              mountPath: /data
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: {{ .Values.minio.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.minio.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: {{ .Values.minio.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.minio.probes.liveness.periodSeconds }}
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-data
