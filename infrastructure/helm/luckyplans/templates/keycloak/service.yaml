{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: {{ include "luckyplans.namespace" . }}
  labels:
    {{- include "luckyplans.labels" . | nindent 4 }}
spec:
  selector:
    app: keycloak
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
{{- end }}
