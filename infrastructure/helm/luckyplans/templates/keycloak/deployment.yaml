{{- if .Values.keycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: {{ include "luckyplans.namespace" . }}
  labels:
    {{- include "luckyplans.labels" . | nindent 4 }}
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image | quote }}
          args:
            - start
            - --import-realm
          securityContext:
            # Keycloak writes to /opt/keycloak/data, /opt/keycloak/lib/quarkus,
            # and other paths at startup — readOnlyRootFilesystem is not feasible
            # for this third-party image without extensive volume mounts.
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.adminUser | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: luckyplans-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: xforwarded
            {{- if .Values.ingress.host }}
            - name: KC_HOSTNAME
              value: {{ printf "https://%s" .Values.ingress.host | quote }}
            {{- else }}
            - name: KC_HOSTNAME_STRICT
              value: "false"
            {{- end }}
            # PostgreSQL database
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: {{ printf "jdbc:postgresql://postgresql:5432/%s" .Values.postgresql.database | quote }}
            - name: KC_DB_USERNAME
              value: {{ .Values.postgresql.username | quote }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: luckyplans-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
              readOnly: true
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /realms/luckyplans
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /realms/luckyplans
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 10
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm-config
{{- end }}
