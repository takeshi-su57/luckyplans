{{- if .Values.keycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: {{ include "luckyplans.namespace" . }}
  labels:
    {{- include "luckyplans.labels" . | nindent 4 }}
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: copy-realm
          image: {{ .Values.keycloak.image | quote }}
          command: ["sh", "-c", "cp /realm-source/*.json /opt/keycloak/data/import/"]
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: realm-source
              mountPath: /realm-source
              readOnly: true
            - name: keycloak-data
              mountPath: /opt/keycloak/data
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image | quote }}
          args:
            - start-dev
            - --import-realm
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.adminUser | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: {{ .Values.keycloak.adminPassword | quote }}
            - name: KC_PROXY
              value: edge
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: keycloak-data
              mountPath: /opt/keycloak/data
            - name: keycloak-tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /realms/luckyplans
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /realms/luckyplans
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 10
      volumes:
        - name: realm-source
          configMap:
            name: keycloak-realm-config
        - name: keycloak-data
          emptyDir: {}
        - name: keycloak-tmp
          emptyDir: {}
{{- end }}
