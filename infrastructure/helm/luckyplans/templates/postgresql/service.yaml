{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: {{ include "luckyplans.namespace" . }}
  labels:
    {{- include "luckyplans.labels" . | nindent 4 }}
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  type: ClusterIP
{{- end }}
