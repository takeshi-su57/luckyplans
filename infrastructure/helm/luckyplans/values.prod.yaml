# Overrides for: prod (k3d on-premises)
# Usage:
#   helm upgrade --install luckyplans ./infrastructure/helm/luckyplans \
#     -f infrastructure/helm/luckyplans/values.yaml \
#     -f infrastructure/helm/luckyplans/values.prod.yaml \
#     --namespace luckyplans --create-namespace --rollback-on-failure --timeout 5m

image:
  registry: 'ghcr.io'
  pullPolicy: Always

config:
  nodeEnv: production
  corsOrigin: 'https://luckyplans.xyz'

ingress:
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: 'true'
    traefik.ingress.kubernetes.io/router.middlewares: luckyplans-redirect-https@kubernetescrd,luckyplans-hsts-header@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: 'luckyplans.xyz'
  tls:
    enabled: true
    secretName: luckyplans-tls

redis:
  resources:
    requests:
      memory: '128Mi'
      cpu: '100m'
    limits:
      memory: '256Mi'
      cpu: '200m'

apiGateway:
  image:
    repository: luckyplans/api-gateway
    tag: '1.0.0'
  replicas: 2
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'

serviceAuth:
  image:
    repository: luckyplans/service-auth
    tag: '1.0.0'
  replicas: 2
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'

serviceCore:
  image:
    repository: luckyplans/service-core
    tag: '1.0.0'
  replicas: 2
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'

web:
  image:
    repository: luckyplans/web
    tag: '1.0.0'
  replicas: 2
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'
  buildArgs:
    graphqlUrl: '/graphql'

certManager:
  enabled: true
  email: 'takeshisuz57@gmail.com'
  issuer: letsencrypt-prod
