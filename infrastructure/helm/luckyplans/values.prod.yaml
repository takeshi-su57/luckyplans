# Overrides for: prod (k3d on-premises)
# Usage:
#   helm upgrade --install luckyplans ./infrastructure/helm/luckyplans \
#     -f infrastructure/helm/luckyplans/values.yaml \
#     -f infrastructure/helm/luckyplans/values.prod.yaml \
#     --namespace luckyplans --create-namespace --rollback-on-failure --timeout 5m
#
# NOTE: Image tags below default to 'latest' as a placeholder. The Update Image
# Tags CI workflow (update-tags.yml) pins them to sha-<commit> after the first
# successful Docker build. Do NOT sync ArgoCD to prod until tags are pinned.

image:
  registry: 'ghcr.io'
  pullPolicy: Always
config:
  nodeEnv: production
  corsOrigin: 'https://beta.luckyplans.xyz'
  # Keycloak issuer must match the `iss` claim in tokens. When KC_HOSTNAME is set
  # to the public URL, Keycloak stamps tokens with the public issuer — so the
  # gateway must verify against the public URL, not the internal cluster URL.
  keycloakIssuer: 'https://admin.luckyplans.xyz/realms/luckyplans'
  keycloakJwksUri: 'https://admin.luckyplans.xyz/realms/luckyplans/protocol/openid-connect/certs'
ingress:
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: 'true'
    traefik.ingress.kubernetes.io/router.middlewares: luckyplans-redirect-https@kubernetescrd,luckyplans-hsts-header@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    landing: 'luckyplans.xyz'
    docs: 'docs.luckyplans.xyz'
    app: 'beta.luckyplans.xyz'
    api: 'api.luckyplans.xyz'
    admin: 'admin.luckyplans.xyz'
  tls:
    enabled: true
    secrets:
      landing: luckyplans-xyz-tls
      docs: docs-luckyplans-tls
      app: beta-luckyplans-tls
      api: api-luckyplans-tls
      admin: admin-luckyplans-tls
      v0api: v0-api-luckyplans-tls
legacyV0:
  enabled: true
  host: 'v0.api.luckyplans.xyz'
  upstreamHost: 'host.k3d.internal'
  useNodeHostIP: false
  # This IP must be the Ubuntu host address reachable from inside the k3d
  # node containers. Verify it on the server with:
  #   docker network inspect <k3d-network-name>
  # If the legacy service binds only to 127.0.0.1:9000, pods cannot reach it
  # through this address; bind the legacy service to 0.0.0.0 or the host IP.
  hostAliases:
    - ip: '172.18.0.1'
      hostnames:
        - host.k3d.internal
  upstreamPort: 9000
redis:
  resources:
    requests:
      memory: '64Mi'
      cpu: '50m'
    limits:
      memory: '128Mi'
      cpu: '100m'
apiGateway:
  image:
    repository: takeshi-su57/api-gateway
    tag: 'sha-bda60e3'
  replicas: 1
  resources:
    requests:
      memory: '192Mi'
      cpu: '100m'
    limits:
      memory: '512Mi'
      cpu: '500m'
prismaMigrate:
  image:
    repository: takeshi-su57/prisma-migrate
    tag: 'sha-bda60e3'
landing:
  image:
    repository: takeshi-su57/landing
    tag: 'sha-bda60e3'
  replicas: 1
  resources:
    requests:
      memory: '96Mi'
      cpu: '50m'
    limits:
      memory: '192Mi'
      cpu: '150m'
  buildArgs:
    appUrl: 'https://beta.luckyplans.xyz/login'
    docsUrl: 'https://docs.luckyplans.xyz'
docs:
  image:
    repository: takeshi-su57/docs
    tag: 'sha-bda60e3'
  buildArgs:
    appUrl: 'https://beta.luckyplans.xyz/login'
web:
  image:
    repository: takeshi-su57/web
    tag: 'sha-bda60e3'
  replicas: 1
  resources:
    requests:
      memory: '192Mi'
      cpu: '100m'
    limits:
      memory: '512Mi'
      cpu: '500m'
  buildArgs:
    graphqlUrl: 'https://api.luckyplans.xyz/graphql'
    docsUrl: 'https://docs.luckyplans.xyz'
postgresql:
  storage: 3Gi
  resources:
    requests:
      memory: '192Mi'
      cpu: '100m'
    limits:
      memory: '512Mi'
      cpu: '300m'
minio:
  storage: 2Gi
  resources:
    requests:
      memory: '128Mi'
      cpu: '50m'
    limits:
      memory: '256Mi'
      cpu: '200m'
keycloak:
  resources:
    requests:
      memory: '384Mi'
      cpu: '150m'
    limits:
      memory: '768Mi'
      cpu: '500m'
# ============================================================
# Sealed Secrets — all prod secrets are encrypted via kubeseal.
# The sealed-secrets-controller in the cluster decrypts them.
# Run: ./infrastructure/scripts/seal-secrets.sh
# ============================================================
sealedSecrets:
  enabled: true
  # Paste output from seal-secrets.sh here.
  # Each value is encrypted by kubeseal and safe to commit to git.
  encryptedData:
    JWT_SECRET: ''
    SESSION_SECRET: ''
    WORKER_CREDENTIAL_PEPPER: ''
    KEYCLOAK_CLIENT_SECRET: ''
    POSTGRES_PASSWORD: ''
    KEYCLOAK_ADMIN_PASSWORD: ''
    MINIO_ACCESS_KEY: ''
    MINIO_SECRET_KEY: ''
    DATABASE_URL: ''
certManager:
  enabled: true
  email: 'takeshisuz57@gmail.com'
  issuer: letsencrypt-prod
smokeTest:
  enabled: true
