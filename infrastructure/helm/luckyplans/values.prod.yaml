# Overrides for: prod (k3d on-premises)
# Usage:
#   helm upgrade --install luckyplans ./infrastructure/helm/luckyplans \
#     -f infrastructure/helm/luckyplans/values.yaml \
#     -f infrastructure/helm/luckyplans/values.prod.yaml \
#     --namespace luckyplans --create-namespace --rollback-on-failure --timeout 5m
#
# NOTE: Image tags below default to 'latest' as a placeholder. The Update Image
# Tags CI workflow (update-tags.yml) pins them to sha-<commit> after the first
# successful Docker build. Do NOT sync ArgoCD to prod until tags are pinned.

image:
  registry: 'ghcr.io'
  pullPolicy: Always
config:
  nodeEnv: production
  corsOrigin: 'https://luckyplans.xyz'
ingress:
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: 'true'
    traefik.ingress.kubernetes.io/router.middlewares: luckyplans-redirect-https@kubernetescrd,luckyplans-hsts-header@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: 'luckyplans.xyz'
  tls:
    enabled: true
    secretName: luckyplans-tls
redis:
  resources:
    requests:
      memory: '128Mi'
      cpu: '100m'
    limits:
      memory: '256Mi'
      cpu: '200m'
apiGateway:
  image:
    repository: takeshi-su57/api-gateway
    tag: 'sha-e5be1fb'
  replicas: 2
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'
serviceCore:
  image:
    repository: takeshi-su57/service-core
    tag: 'sha-e5be1fb'
  replicas: 2
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'
web:
  image:
    repository: takeshi-su57/web
    tag: 'sha-e5be1fb'
  replicas: 2
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'
  buildArgs:
    graphqlUrl: '/graphql'
postgresql:
  storage: 5Gi
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'
# ============================================================
# Sealed Secrets — all prod secrets are encrypted via kubeseal.
# The sealed-secrets-controller in the cluster decrypts them.
# Run: ./infrastructure/scripts/seal-secrets.sh
# ============================================================
sealedSecrets:
  enabled: true
  # Paste output from seal-secrets.sh here.
  # Each value is encrypted by kubeseal and safe to commit to git.
  encryptedData: {}
  # Example (replace with real sealed values):
  #   JWT_SECRET: "AgBy3i4OJSWK+PiT..."
  #   SESSION_SECRET: "AgCE8fj2K+9sLm..."
  #   KEYCLOAK_CLIENT_SECRET: "AgDx7kR3mN+pQw..."
  #   POSTGRES_PASSWORD: "AgFh4nT1bW+xZv..."
  #   KEYCLOAK_ADMIN_PASSWORD: "AgGi5oU2cX+yAw..."
certManager:
  enabled: true
  email: 'takeshisuz57@gmail.com'
  issuer: letsencrypt-prod
smokeTest:
  enabled: true
