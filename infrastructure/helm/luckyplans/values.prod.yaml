# Overrides for: prod (k3d on-premises)
# Usage:
#   helm upgrade --install luckyplans ./infrastructure/helm/luckyplans \
#     -f infrastructure/helm/luckyplans/values.yaml \
#     -f infrastructure/helm/luckyplans/values.prod.yaml \
#     --namespace luckyplans --create-namespace --rollback-on-failure --timeout 5m
#
# NOTE: Image tags below default to 'latest' as a placeholder. The Update Image
# Tags CI workflow (update-tags.yml) pins them to sha-<commit> after the first
# successful Docker build. Do NOT sync ArgoCD to prod until tags are pinned.

image:
  registry: 'ghcr.io'
  pullPolicy: Always
config:
  nodeEnv: production
  corsOrigin: 'https://luckyplans.xyz'
ingress:
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: 'true'
    traefik.ingress.kubernetes.io/router.middlewares: luckyplans-redirect-https@kubernetescrd,luckyplans-hsts-header@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: 'luckyplans.xyz'
  tls:
    enabled: true
    secretName: luckyplans-tls
redis:
  resources:
    requests:
      memory: '128Mi'
      cpu: '100m'
    limits:
      memory: '256Mi'
      cpu: '200m'
apiGateway:
  image:
    repository: takeshi-su57/api-gateway
    tag: 'sha-e5be1fb'
  replicas: 2
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'
serviceCore:
  image:
    repository: takeshi-su57/service-core
    tag: 'sha-e5be1fb'
  replicas: 2
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'
web:
  image:
    repository: takeshi-su57/web
    tag: 'sha-e5be1fb'
  replicas: 2
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'
  buildArgs:
    graphqlUrl: '/graphql'
postgresql:
  storage: 5Gi
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'
keycloak:
  # In production the Keycloak admin password must be overridden via
  # --set keycloak.adminPassword=<value> or an external secrets manager.
  adminPassword: 'changeme'
secrets:
  # IMPORTANT: All secrets must be explicit for ArgoCD (helm template cannot
  # use lookup or randAlphaNum reliably). Override these via --set or a sealed
  # secrets solution. The values below are PLACEHOLDERS — replace them.
  #
  # To generate secure values:
  #   openssl rand -base64 48   (for JWT_SECRET, SESSION_SECRET)
  #   openssl rand -base64 24   (for POSTGRES_PASSWORD)
  JWT_SECRET: 'CHANGE-ME-generate-with-openssl-rand-base64-48'
  SESSION_SECRET: 'CHANGE-ME-generate-with-openssl-rand-base64-48'
  KEYCLOAK_CLIENT_SECRET: 'changeme'
  POSTGRES_PASSWORD: 'CHANGE-ME-generate-with-openssl-rand-base64-24'
certManager:
  enabled: true
  email: 'takeshisuz57@gmail.com'
  issuer: letsencrypt-prod
smokeTest:
  enabled: true
