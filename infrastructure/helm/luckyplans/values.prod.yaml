# Overrides for: prod (k3d on-premises)
# Usage:
#   helm upgrade --install luckyplans ./infrastructure/helm/luckyplans \
#     -f infrastructure/helm/luckyplans/values.yaml \
#     -f infrastructure/helm/luckyplans/values.prod.yaml \
#     --namespace luckyplans --create-namespace --rollback-on-failure --timeout 5m
#
# NOTE: Image tags below default to 'latest' as a placeholder. The Update Image
# Tags CI workflow (update-tags.yml) pins them to sha-<commit> after the first
# successful Docker build. Do NOT sync ArgoCD to prod until tags are pinned.

image:
  registry: 'ghcr.io'
  pullPolicy: Always
config:
  nodeEnv: production
  corsOrigin: 'https://luckyplans.xyz'
ingress:
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: 'true'
    traefik.ingress.kubernetes.io/router.middlewares: luckyplans-redirect-https@kubernetescrd,luckyplans-hsts-header@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: 'luckyplans.xyz'
  tls:
    enabled: true
    secretName: luckyplans-tls
redis:
  resources:
    requests:
      memory: '128Mi'
      cpu: '100m'
    limits:
      memory: '256Mi'
      cpu: '200m'
apiGateway:
  image:
    repository: takeshi-su57/api-gateway
    tag: 'sha-cc3e799'
  replicas: 2
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'
serviceAuth:
  image:
    repository: takeshi-su57/service-auth
    tag: 'sha-cc3e799'
  replicas: 2
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'
serviceCore:
  image:
    repository: takeshi-su57/service-core
    tag: 'sha-cc3e799'
  replicas: 2
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'
web:
  image:
    repository: takeshi-su57/web
    tag: 'sha-cc3e799'
  replicas: 2
  resources:
    requests:
      memory: '256Mi'
      cpu: '200m'
    limits:
      memory: '512Mi'
      cpu: '500m'
  buildArgs:
    graphqlUrl: '/graphql'
certManager:
  enabled: true
  email: 'takeshisuz57@gmail.com'
  issuer: letsencrypt-prod
smokeTest:
  enabled: true
