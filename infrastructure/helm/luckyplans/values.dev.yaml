# Overrides for: dev (k3d on VPS)
# Usage:
#   helm upgrade --install luckyplans ./infrastructure/helm/luckyplans \
#     -f infrastructure/helm/luckyplans/values.yaml \
#     -f infrastructure/helm/luckyplans/values.dev.yaml \
#     --namespace luckyplans --create-namespace --rollback-on-failure --timeout 5m

image:
  registry: 'ghcr.io'
  pullPolicy: Always

config:
  # "production" is intentional — dev runs production-built images from GHCR
  # (not source-mode with hot reload). Only local k3d uses development.
  nodeEnv: production
  corsOrigin: 'https://dev.luckyplans.xyz'

ingress:
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: 'true'
    traefik.ingress.kubernetes.io/router.middlewares: luckyplans-redirect-https@kubernetescrd,luckyplans-hsts-header@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: 'dev.luckyplans.xyz'
  tls:
    enabled: true
    secretName: luckyplans-dev-tls

certManager:
  enabled: true
  email: 'takeshisuz57@gmail.com'
  issuer: letsencrypt-prod

# CI overrides repository and tag via --set flags.
# These defaults are for manual deployment only.
apiGateway:
  image:
    repository: luckyplans/api-gateway
    tag: dev

serviceAuth:
  image:
    repository: luckyplans/service-auth
    tag: dev

serviceCore:
  image:
    repository: luckyplans/service-core
    tag: dev

web:
  image:
    repository: luckyplans/web
    tag: dev
  buildArgs:
    graphqlUrl: '/graphql'
