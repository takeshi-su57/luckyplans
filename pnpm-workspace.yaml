packages:
  - 'apps/*'
  - 'packages/*'
injectWorkspacePackages: true
forceLegacyDeploy: true
allowBuilds:
  '@apollo/protobufjs': false
  '@nestjs/core': false
  '@prisma/engines': false
  core-js: false
  esbuild: true
  prisma: false
  protobufjs: false
  sharp: false
overrides:
  'hono': '>=4.12.4'
  '@hono/node-server': '>=1.19.10'
  'minimatch': '>=10.2.3'
  'tar': '>=7.5.11'
  'effect': '>=3.20.0'
  '@nestjs/core>path-to-regexp': '>=8.4.0'
  '@nestjs/platform-express>path-to-regexp': '>=8.4.0'
  'express@4.22.2>path-to-regexp': '~0.1.12'
  'react-router@5.3.4>path-to-regexp': '^1.7.0'
  'picomatch': '>=4.0.4'
  'multer': '2.2.0'
  'serialize-javascript': '>=7.0.3'
  '@nestjs/graphql>ws': '>=8.21.0'
  'graphql-ws>ws': '>=8.21.0'
  'gray-matter>js-yaml': '>=4.2.0'
  'next>postcss': '>=8.5.10'
  'sockjs>uuid': '>=11.1.1'
patchedDependencies:
  'gray-matter@4.0.3': patches/gray-matter@4.0.3.patch
minimumReleaseAgeExclude:
  - '@turbo/darwin-64@2.9.18'
  - '@turbo/darwin-arm64@2.9.18'
  - '@turbo/linux-64@2.9.18'
  - '@turbo/linux-arm64@2.9.18'
  - '@turbo/windows-64@2.9.18'
  - '@turbo/windows-arm64@2.9.18'
  - '@types/node@25.9.3'
  - turbo@2.9.18
